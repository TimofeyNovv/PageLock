<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PageLock</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <h1>PageLock</h1>
      <p id="site" class="site">Загрузка...</p>
      <p id="status" class="status"></p>

      <div class="actions">
        <button id="add-button" type="button">Добавить в черный список</button>
        <button id="remove-button" type="button">Удалить из черного списка</button>
      </div>

      <div id="password-form" class="password-form" hidden>
        <label id="password-label" for="password-input">Код PageLock</label>
        <div class="password-input-row">
          <input
            id="password-input"
            type="text"
            autocomplete="one-time-code"
            autocapitalize="off"
            autocorrect="off"
            spellcheck="false"
            aria-required="true"
            data-lpignore="true"
            data-1p-ignore="true"
            data-bwignore="true"
            readonly
          >
          <button
            id="toggle-password-button"
            class="password-toggle"
            type="button"
            aria-label="Показать пароль"
            aria-pressed="false"
            title="Показать пароль"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/>
            </svg>
          </button>
        </div>
        <button id="submit-button" type="button">Сохранить</button>
      </div>

      <p id="message" class="message" aria-live="polite"></p>
    </main>

    <script src="../shared/browser-api.js"></script>
    <script src="../shared/site.js"></script>
    <script src="../shared/crypto.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
